<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenArtStew</title>
    <style>
        /* 1. 커스텀 폰트 설정 (파일명과 경로가 정확해야 합니다) */
        @font-face {
            font-family: 'Galmuri11';
            src: url('Galmuri11.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #0a0a0c; /* 조금 더 깊은 블랙으로 변경 */
        }

        /* 2. 메인 텍스트 스타일 (화면 중앙 고정) */
        .main-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100; /* 이미지보다 위에 오도록 설정 */
            
            font-family: 'Galmuri11', sans-serif;
            font-size: 5rem; /* 글자 크기 (모바일은 아래 미디어 쿼리에서 조절) */
            font-weight: bold;
            color: #2ecc71; /* GreenArtStew에 어울리는 초록색 */
            text-align: center;
            white-space: nowrap;
            
            /* 픽셀 폰트의 매력을 살리는 네온 글로우 효과 */
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.5),
                         0 0 20px rgba(46, 204, 113, 0.3);
            
            user-select: none; /* 텍스트 드래그 방지 */
            pointer-events: none; /* 텍스트가 마우스 이벤트를 방해하지 않게 */
        }

        /* 이미지가 돌아다닐 컨테이너 */
        #floater-container {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
        }

        .floater {
            position: absolute;
            pointer-events: none;
            will-change: transform;
            opacity: 0.5; /* 텍스트 가독성을 위해 배경 이미지 투명도 살짝 낮춤 */
        }

        /* 모바일 대응: 화면이 작을 때는 글자 크기 축소 */
        @media (max-width: 768px) {
            .main-text {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="main-text">GreenArtStew</div>

    <div id="floater-container"></div>

    <script>
        const container = document.getElementById('floater-container');
        const numFloaters = 20; // 텍스트 집중도를 위해 개수를 살짝 줄임
        const imgSrcs = ['bait.png', 'zol.png'];
        const minSize = 50;
        const maxSize = 100;
        const minSpeed = 20; 
        const maxSpeed = 60; // 텍스트가 잘 보이도록 속도를 조금 더 늦춤

        let floaters = [];
        let startTime = null;

        function initFloaters() {
            for (let i = 0; i < numFloaters; i++) {
                const img = document.createElement('img');
                const srcIndex = Math.floor(Math.random() * imgSrcs.length);
                img.src = imgSrcs[srcIndex];
                img.className = 'floater';
                
                const size = Math.random() * (maxSize - minSize) + minSize;
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * (maxSpeed - minSpeed) + minSpeed;
                
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;

                img.style.width = size + 'px';
                img.style.left = x + 'px';
                img.style.top = y + 'px';

                container.appendChild(img);

                floaters.push({
                    element: img,
                    x: x,
                    y: y,
                    vx: vx,
                    vy: vy,
                    width: size
                });
            }
        }

        function animateFloaters(timestamp) {
            if (!startTime) startTime = timestamp;
            const deltaTime = (timestamp - startTime) / 1000;
            startTime = timestamp;

            const winWidth = window.innerWidth;
            const winHeight = window.innerHeight;

            for (let floater of floaters) {
                floater.x += floater.vx * deltaTime;
                floater.y += floater.vy * deltaTime;

                if (floater.x > winWidth) floater.x = -floater.width;
                else if (floater.x < -floater.width) floater.x = winWidth;

                const floaterHeight = floater.element.offsetHeight || floater.width;
                if (floater.y > winHeight) floater.y = -floaterHeight;
                else if (floater.y < -floaterHeight) floater.y = winHeight;

                floater.element.style.left = floater.x + 'px';
                floater.element.style.top = floater.y + 'px';
            }

            requestAnimationFrame(animateFloaters);
        }

        window.onload = function() {
            initFloaters();
            requestAnimationFrame(animateFloaters);
        };
    </script>
</body>
</html>
